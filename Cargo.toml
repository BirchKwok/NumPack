[package]
name = "numpack"
version = "0.1.0"
edition = "2021"

[lib]
name = "numpack"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.19.0", features = ["extension-module"] }
numpy = "0.19.0"
ndarray = "0.15.6"
tempfile = "3.8.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rayon = "1.8"
memmap2 = "0.5.10"
float16 = "0.1"

[build-dependencies]
pyo3-build-config = "0.20.0"

